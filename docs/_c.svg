<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">HRTV tracking state cycle</title>
  <desc id="desc">A cyclic state machine. SEARCHING uses face recognition to acquire the target; on a face match it moves to LOCKED, which tracks the person. On occlusion or temporary loss it moves to REASSOCIATING, which recovers the target back to LOCKED. If the target stays lost too long it returns to SEARCHING, restarting face recognition.</desc>

  <rect x="0" y="0" width="960" height="640" rx="16" fill="#0d1117"/>

  <defs>
    <marker id="a-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2f81f7"/>
    </marker>
    <marker id="a-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3fb950"/>
    </marker>
    <marker id="a-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d29922"/>
    </marker>
    <marker id="a-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f85149"/>
    </marker>
  </defs>

  <style>
    .h  { fill: #e6edf3; font-size: 20px; font-weight: 500; }
    .st { font-size: 18px; font-weight: 500; }
    .tag{ font-size: 12px; font-weight: 500; letter-spacing: .06em; }
    .sub{ font-size: 12.5px; font-weight: 400; }
    .el { font-size: 12.5px; font-weight: 500; }
    .els{ font-size: 11.5px; font-weight: 400; }
  </style>

  <text x="48" y="52" class="h">HRTV — tracking state cycle</text>
  <text x="48" y="76" class="sub" fill="#8b949e">One target, three states. The system loops between them for every frame.</text>

  <!-- ============ SEARCHING (green) ============ -->
  <rect x="70" y="150" width="250" height="150" rx="16" fill="#0e2a17" stroke="#3fb950" stroke-width="2"/>
  <text x="92" y="184" class="tag" fill="#3fb950">STATE 1 · UNLOCKED</text>
  <text x="92" y="212" class="st" fill="#7ee787">SEARCHING</text>
  <text x="92" y="240" class="sub" fill="#c9d1d9">Face recognition (dlib)</text>
  <text x="92" y="261" class="sub" fill="#8b949e">scans every person for the</text>
  <text x="92" y="279" class="sub" fill="#8b949e">known face encodings</text>

  <!-- ============ LOCKED (blue) ============ -->
  <rect x="640" y="150" width="250" height="150" rx="16" fill="#0d2440" stroke="#2f81f7" stroke-width="2"/>
  <text x="662" y="184" class="tag" fill="#2f81f7">STATE 2 · LOCKED</text>
  <text x="662" y="212" class="st" fill="#9ecbff">TRACKING</text>
  <text x="662" y="240" class="sub" fill="#c9d1d9">Follows the YOLOv8n</text>
  <text x="662" y="261" class="sub" fill="#c9d1d9">persistent track_id</text>
  <text x="662" y="279" class="sub" fill="#8b949e">face no longer needed</text>

  <!-- ============ REASSOCIATING (amber) ============ -->
  <rect x="355" y="420" width="250" height="160" rx="16" fill="#33240a" stroke="#d29922" stroke-width="2"/>
  <text x="377" y="454" class="tag" fill="#d29922">STATE 3 · KEEP-LOCK</text>
  <text x="377" y="482" class="st" fill="#e3b341">REASSOCIATING</text>
  <text x="377" y="509" class="sub" fill="#c9d1d9">appearance histogram +</text>
  <text x="377" y="527" class="sub" fill="#c9d1d9">motion prediction + IoU</text>
  <text x="377" y="545" class="sub" fill="#8b949e">recover the target through</text>
  <text x="377" y="563" class="sub" fill="#8b949e">crossings &amp; occlusions</text>

  <!-- ============ TRANSITIONS ============ -->

  <!-- SEARCHING -> LOCKED (face match) -->
  <path d="M320 205 L634 205" fill="none" stroke="#3fb950" stroke-width="2.5" marker-end="url(#a-green)"/>
  <text x="477" y="192" text-anchor="middle" class="el" fill="#3fb950">face recognized</text>
  <text x="477" y="228" text-anchor="middle" class="els" fill="#8b949e">matched to a person box by IoU → lock</text>

  <!-- LOCKED -> REASSOCIATING (occlusion / temp loss) -->
  <path d="M690 300 C 660 380, 610 410, 578 416" fill="none" stroke="#d29922" stroke-width="2.5" marker-end="url(#a-amber)"/>
  <text x="648" y="366" class="el" fill="#d29922">target ID lost</text>
  <text x="648" y="384" class="els" fill="#8b949e">occlusion or crossing</text>

  <!-- REASSOCIATI